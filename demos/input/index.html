<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Manager • Nano WebGPU</title>
    <style>
        body {
            margin: 0;
            background: #222;
            color: white;
            font-family: sans-serif;
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        #ui {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #444;
            max-width: 300px;
            z-index: 10;
        }

        h3 {
            margin-top: 0;
            color: #00e5ff;
        }

        .info {
            color: #aaa;
            font-size: 14px;
            margin-top: 15px;
        }

        .back {
            display: inline-block;
            margin-bottom: 10px;
            color: #888;
            text-decoration: none;
            font-size: 14px;
        }

        .back:hover {
            color: #fff;
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div id="ui">
        <a href="../index.html" class="back">← Voltar ao Hub</a>
        <h3>Input Manager Demo</h3>
        <p>Use os botões abaixo no teclado e mouse:</p>
        <div class="info">
            • <b>W, A, S, D</b> ou <b>Setas</b>: Move o cubo<br>
            • <b>Espaço</b>: Pula (Just Pressed)<br>
            • <b>Clique Segurado</b>: Arrasta a cor<br>
            • <b>Movimento Mouse</b>: Gira o cubo<br>
        </div>
    </div>

    <canvas id="canvas"></canvas>

    <script type="module" src="./main.ts"></script>
</body>

</html>
