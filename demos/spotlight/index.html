<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nano WebGPU — SpotLight and PSM Demo</title>
    <style>
        html,
        body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #050508;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            color: #fff;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        .overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            background: rgba(10, 10, 15, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            max-width: 320px;
        }

        h2 {
            margin: 0 0 8px 0;
            font-size: 1.4rem;
            background: linear-gradient(135deg, #00e5ff, #8a2be2);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            margin: 0 0 12px 0;
            font-size: 0.9rem;
            color: #a0a0b0;
            line-height: 1.4;
        }

        .badge {
            display: inline-block;
            background: rgba(0, 229, 255, 0.2);
            color: #00e5ff;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <canvas id="canvas"></canvas>
    
    <div class="overlay">
        <h2>SpotLight &amp; PSM Shadow</h2>
        <p>Demonstração da iluminação cônica com atenuação física e mapeamento de sombras perspectivo (Perspective Shadow Mapping) em tempo real via WebGPU.</p>
        <span class="badge">WebGPU Core</span>
    </div>

    <script type="module" src="./demo.ts"></script>
</body>

</html>
