<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nano WebGPU Demo</title>
    <style>
        body {
            margin: 32px;
            font-family: sans-serif;
            background: #1a1a1a;
            color: #fff;
        }

        html,
        body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #000;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        .status {
            padding: 10px;
            border-radius: 4px;
            display: inline-block;
        }

        .success {
            background: #2e7d32;
        }

        .error {
            background: #c62828;
        }
    </style>
</head>

<body>
    <canvas id="canvas"></canvas>
    <script type="module" src="./demo.ts"></script>
</body>

</html>
